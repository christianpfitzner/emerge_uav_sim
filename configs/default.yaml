# ============================================================
# emerge_uav_sim — training parameter file
# Usage: python3 examples/train_mappo.py --config configs/default.yaml
# CLI args always override values set here.
# ============================================================

# --- General -------------------------------------------------
total_steps: 200000
n_steps: 512               # per worker; 8 workers × 512 = 4096 steps/update, ~4 episodes averaged
lr: 0.0003
seed: 42
save_dir: checkpoints
save_every: 50
n_workers: 8               # parallel envs → reward averaged over 4×3 episodes per update
load: null           # path to checkpoint, e.g. checkpoints/final.pt
render: false
no_training_panel: false

# --- Reward shaping ------------------------------------------
reward_coverage: 0.1           # per new personal cell — drives exploration
reward_inspection: 5.0         # was 20.0; at 20 inspector-bonus (0.5/step) dominated everything,
                               # causing agents to camp on POIs and ignore battery
role_shaping_strength: 0.5     # inspector bonus = strength * (reward_inspection / inspection_steps)
                               # = 0.5 * (5.0/20) = 0.125/step — now balanced vs coverage+exploration

penalty_same_cell: -0.3        # per-step penalty when agents share a grid cell
exploration_bonus: 0.1         # per-step bonus per agent: strength * (dist_base / diagonal)
spread_bonus: 0.1              # per-step team bonus: strength * (mean_pairwise_dist / diagonal)

require_delivery: true
reward_delivery_poi: 10.0
connected_bonus: 0.005         # was 0.1 — at 0.1/step agents earn +100 over episode just by
                               # staying near base, which completely dominates all exploration rewards

penalty_redundant_poi: -0.2    # penalty per step for crowding on a POI another agent is inspecting
loitering_penalty: -0.005       # small per-step penalty for idling near base
loitering_radius: 15.0

penalty_dead: -30.0
reward_relay: 2.0
relay_cooldown: 1

# Battery management — must dominate inspector bonus at low battery:
# At battery=0.5 (threshold): penalty = 5.0 * (0.6-0.5) = 0.5/step > inspector bonus (0.125/step)
# → agents will prefer to return rather than keep inspecting
reward_battery_return: 3.0     # one-time bonus on docking, scaled by battery remaining
penalty_low_battery: 5.0       # was 3.0; must exceed inspector bonus when battery is low
low_battery_threshold: 0.6     # was 0.5; trigger earlier so agents have time to return

reward_speed: 0.03             # per-step bonus proportional to speed — directly incentivises movement
                               # at max_speed=5: +0.03/step; hovering: 0 → agents learn to keep moving

penalty_revisit: -0.1
penalty_revisit_known: -0.25   # discourages sitting in already-visited cells

# --- PPO hyperparameters -------------------------------------
n_epochs: 4
batch_size: 256
gamma: 0.99
gae_lambda: 0.95
clip_eps: 0.2
entropy_coef: 0.0              # off: environment diversity + penalties provide sufficient exploration signal
value_coef: 0.5
hidden_dim: 128
log_std_init: -0.5
